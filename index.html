<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life in Weeks by Ambarish Mallick</title>

    <meta name="description" content="A beautiful, emotional visualization of your life in weeks. Map your memories, track your time, and generate a custom digital poster of your life's journey.">
    <meta name="keywords" content="life in weeks, memento mori, life calendar, emotion tracker, digital poster, memory tracker">
    <meta name="author" content="Ambarish Mallick">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 25, 40, 0.4);
            --glass-border-light: rgba(255, 255, 255, 0.2);
            --glass-border-dark: rgba(0, 0, 0, 0.5);
            --text-main: #f8fafc;
            --dot-empty: rgba(255, 255, 255, 0.1);
            --dot-lived: rgba(255, 255, 255, 0.4); 
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-orbs {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; pointer-events: none;
            background: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15), transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(16, 185, 129, 0.1), transparent 50%);
            animation: breathe 10s infinite alternate ease-in-out;
        }

        @keyframes breathe { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }

        #main-ui {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding-bottom: 80px;
        }

        .glass-panel {
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border-light);
            border-left: 1px solid var(--glass-border-light);
            border-bottom: 1px solid var(--glass-border-dark);
            border-right: 1px solid var(--glass-border-dark);
            border-radius: 24px;
            padding: 40px; margin: 40px 20px 20px 20px;
            max-width: 700px; text-align: center; width: 90%;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5), inset 2px 2px 10px rgba(255, 255, 255, 0.05);
            position: relative; z-index: 10;
        }

        h1 { margin-top: 0; margin-bottom: 5px; font-weight: 200; letter-spacing: 4px; font-size: 28px; text-transform: uppercase; }
        .credit { font-weight: 300; opacity: 0.6; font-size: 14px; letter-spacing: 2px; margin-bottom: 25px; font-style: italic; }
        p { opacity: 0.7; font-size: 14px; margin-bottom: 30px; }
        
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;
            margin: 20px 0; padding: 20px; 
            background: rgba(0,0,0,0.3); border-radius: 16px;
            box-shadow: inset 2px 2px 8px rgba(0,0,0,0.5);
        }
        .stat-box h3 { margin: 0 0 5px 0; font-size: 26px; font-weight: 400; color: #fff; }
        .stat-box p { margin: 0; font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        .btn-3d {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border-light);
            border-left: 1px solid var(--glass-border-light);
            border-right: 1px solid var(--glass-border-dark);
            border-bottom: 1px solid var(--glass-border-dark);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3), inset 1px 1px 2px rgba(255,255,255,0.2);
            color: #fff; border-radius: 12px; padding: 12px 24px;
            font-size: 14px; font-weight: 500; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s ease;
            font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-3d:hover { background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)); }
        .btn-3d:active { transform: translateY(3px); box-shadow: 1px 1px 5px rgba(0,0,0,0.5), inset 2px 2px 8px rgba(0,0,0,0.6); }

        .date-picker-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; }
        .wheel-container {
            display: flex; gap: 5px; height: 120px; position: relative;
            background: rgba(0,0,0,0.4); border-radius: 16px; padding: 0 10px;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.6), inset -2px -2px 5px rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border-dark);
        }
        .wheel { width: 70px; overflow-y: scroll; scroll-snap-type: y mandatory; padding: 40px 0; }
        .wheel::-webkit-scrollbar { display: none; }
        .wheel-item {
            height: 40px; display: flex; align-items: center; justify-content: center;
            scroll-snap-align: center; font-size: 16px; font-weight: 500;
            color: rgba(255,255,255,0.3); transition: color 0.2s, transform 0.2s;
        }
        .wheel-highlight {
            position: absolute; top: 40px; left: 0; right: 0; height: 40px;
            background: rgba(255,255,255,0.08); border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(0,0,0,0.5); pointer-events: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .sentiment-picker, .custom-maker { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .sentiment-btn { padding: 10px 18px; border-radius: 30px; }
        .sentiment-btn.active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), 0 0 15px var(--active-color); border: 1px solid var(--active-color); transform: scale(1.02); background: rgba(0,0,0,0.2); }
        .color-indicator { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }

        input[type="text"] {
            padding: 12px 16px; border-radius: 12px; border: none; background: rgba(0,0,0,0.3); color: white; 
            font-family: inherit; box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1); outline: none;
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }

        .color-picker-label {
            display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
            background: rgba(0,0,0,0.3); box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden;
        }
        .color-picker-preview { width: 24px; height: 24px; border-radius: 50%; pointer-events: none; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.8); }
        input[type="color"] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); margin: 30px 0; }

        .spiral-wrapper {
            position: relative; width: 100%; max-width: 900px; 
            aspect-ratio: 1 / 1; margin-top: 20px;
        }

        .spiral-content { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        .week-dot {
            position: absolute; width: 7px; height: 7px; border-radius: 50%;
            background-color: var(--dot-empty); cursor: pointer;
            transform: translate(-50%, -50%); 
            transition: transform 0.2s, background-color 0.3s, box-shadow 0.3s;
            z-index: 2; 
        }
        .week-dot:hover { transform: translate(-50%, -50%) scale(2.5); z-index: 5; }

        @keyframes pulse-current {
            0% { transform: translate(-50%, -50%) scale(1.5); filter: brightness(1); box-shadow: 0 0 5px rgba(255,255,255,0.4); }
            100% { transform: translate(-50%, -50%) scale(2.2); filter: brightness(1.2); box-shadow: 0 0 15px rgba(255,255,255,1); }
        }
        .week-dot.current-week {
            animation: pulse-current 1.5s infinite alternate ease-in-out;
            z-index: 6;
            background-color: #f8fafc; 
        }

        #tooltip {
            position: absolute; background: rgba(0, 0, 0, 0.9); color: white;
            padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
            pointer-events: none; opacity: 0; transition: opacity 0.1s;
            z-index: 100; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px); display: flex; flex-direction: column; gap: 4px;
            text-align: left; min-width: 120px;
        }
        
        .tt-life { color: #94a3b8; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .tt-year { font-size: 14px; color: #f8fafc; }
        .tt-emotion { font-weight: 700; display: flex; align-items: center; gap: 6px; margin-top: 2px;}

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(11, 15, 25, 0.9); z-index: 9999;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; color: white; font-weight: 300; letter-spacing: 2px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="bg-orbs"></div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div>DEVELOPING MASTERPIECE...</div>
    </div>

    <div id="main-ui">
        <div class="glass-panel">
            <h1>LIFE IN WEEKS</h1>
            <div class="credit">by Ambarish Mallick</div>
            <p>Your life unfolding in a continuous path from the center out. <br>Your data never leaves your device.</p>
            
            <div class="date-picker-wrapper">
                <div class="wheel-container">
                    <div class="wheel-highlight"></div>
                    <div class="wheel" id="wheel-day" onscroll="updateWheelHighlight('wheel-day')"></div>
                    <div class="wheel" id="wheel-month" onscroll="updateWheelHighlight('wheel-month')"></div>
                    <div class="wheel" id="wheel-year" onscroll="updateWheelHighlight('wheel-year')"></div>
                </div>
                <button class="btn-3d" onclick="calculateLived()">Set Origin Date</button>
            </div>

            <div class="stats-grid">
                <div class="stat-box"><h3 id="stat-lived">0</h3><p>Weeks Lived</p></div>
                <div class="stat-box"><h3 id="stat-ahead">4000</h3><p>Weeks Ahead</p></div>
                <div class="stat-box"><h3 id="stat-percent">0%</h3><p>Life Used</p></div>
            </div>

            <div class="divider"></div>

            <div class="sentiment-picker" id="sentiment-picker"></div>

            <div class="custom-maker">
                <input type="text" id="custom-name" placeholder="Name an emotion...">
                <label class="color-picker-label" title="Pick a color">
                    <div class="color-picker-preview" id="color-preview" style="background-color: #a855f7;"></div>
                    <input type="color" id="custom-color" value="#a855f7" oninput="document.getElementById('color-preview').style.backgroundColor = this.value">
                </label>
                <button class="btn-3d" onclick="addCustomSentiment()">Add Emotion</button>
            </div>

            <div class="divider" data-html2canvas-ignore="true"></div>

            <div class="sentiment-picker" data-html2canvas-ignore="true" style="gap: 15px;">
                <button class="btn-3d" onclick="exportPoster()" style="color: #60a5fa;">Export Masterpiece</button>
                <button class="btn-3d" onclick="exportBackup()" style="color: #a7f3d0;">↓ Save Backup</button>
                <button class="btn-3d" onclick="document.getElementById('import-file').click()" style="color: #fde047;">↑ Load Backup</button>
                <button class="btn-3d" onclick="clearAll()" style="color: #f87171;">Erase Canvas</button>
                
                <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importBackup(event)">
            </div>
        </div>

        <div class="spiral-wrapper">
            <div class="spiral-content" id="spiral"></div>
            <div id="tooltip"></div>
        </div>
    </div>

    <script>
        const TOTAL_WEEKS = 4000;
        const MAX_CHANGES = 10;
        const spiral = document.getElementById('spiral');
        const tooltip = document.getElementById('tooltip');
        
        let userDOB = localStorage.getItem('lifeDOB') || null;
        let savedSentiments = JSON.parse(localStorage.getItem('lifeSentiments')) || {}; 
        let weeksLivedCount = 0;

        let sentimentLibrary = {
            changing: { name: 'Life-Changing (Max 10)', color: '#ec4899' },
            lovely: { name: 'Lovely', color: '#fbbf24' },
            exciting: { name: 'Exciting', color: '#f97316' },
            productive: { name: 'Productive', color: '#10b981' },
            difficult: { name: 'Difficult', color: '#ef4444' },
            peaceful: { name: 'Peaceful', color: '#06b6d4' }
        };

        let customSentiments = JSON.parse(localStorage.getItem('lifeCustomSentiments')) || {};
        sentimentLibrary = { ...sentimentLibrary, ...customSentiments };
        let currentSentimentKey = 'changing'; 

        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        function init() {
            buildScrollWheels();
            if (userDOB) {
                setWheelsToDate(new Date(userDOB));
                updateStats();
            }
            renderSentimentButtons();
            renderSpiral();
        }

        function buildScrollWheels() {
            const dayW = document.getElementById('wheel-day');
            const monthW = document.getElementById('wheel-month');
            const yearW = document.getElementById('wheel-year');
            
            for(let i=1; i<=31; i++) dayW.innerHTML += `<div class="wheel-item">${i}</div>`;
            months.forEach(m => monthW.innerHTML += `<div class="wheel-item">${m}</div>`);
            
            const currentYear = new Date().getFullYear();
            for(let i=1920; i<=currentYear; i++) yearW.innerHTML += `<div class="wheel-item">${i}</div>`;

            setTimeout(() => { updateWheelHighlight('wheel-day'); updateWheelHighlight('wheel-month'); updateWheelHighlight('wheel-year'); }, 100);
        }

        function updateWheelHighlight(wheelId) {
            const wheel = document.getElementById(wheelId);
            const items = wheel.getElementsByClassName('wheel-item');
            const activeIndex = Math.round(wheel.scrollTop / 40);
            
            for(let i=0; i<items.length; i++) {
                if(i === activeIndex) { items[i].style.color = 'white'; items[i].style.transform = 'scale(1.1)'; } 
                else { items[i].style.color = 'rgba(255,255,255,0.3)'; items[i].style.transform = 'scale(1)'; }
            }
        }

        function getSelectedDateFromWheels() {
            const dScroll = document.getElementById('wheel-day').scrollTop;
            const mScroll = document.getElementById('wheel-month').scrollTop;
            const yScroll = document.getElementById('wheel-year').scrollTop;
            return new Date(Math.round(yScroll / 40) + 1920, Math.round(mScroll / 40), Math.round(dScroll / 40) + 1);
        }

        function setWheelsToDate(date) {
            document.getElementById('wheel-day').scrollTop = (date.getDate() - 1) * 40;
            document.getElementById('wheel-month').scrollTop = date.getMonth() * 40;
            document.getElementById('wheel-year').scrollTop = (date.getFullYear() - 1920) * 40;
        }

        function getWeekData(n) {
            if (!userDOB) {
                const year = Math.floor(n / 52) + 1;
                const week = (n % 52) + 1;
                return { lifeWeek: n + 1, calYear: year, calWeek: week, labelYear: `Age Year ${year}` };
            }
            const dob = new Date(userDOB);
            const msPerWeek = 7 * 24 * 60 * 60 * 1000;
            const date = new Date(dob.getTime() + n * msPerWeek);
            
            const calYear = date.getFullYear();
            const startOfYear = new Date(calYear, 0, 1);
            const days = Math.floor((date - startOfYear) / (24 * 60 * 60 * 1000));
            const calWeek = Math.ceil((days + startOfYear.getDay() + 1) / 7);
            
            return { lifeWeek: n + 1, calYear: calYear, calWeek: calWeek, labelYear: calYear };
        }

        function calculateLived() {
            const dob = getSelectedDateFromWheels();
            if (dob > new Date()) return alert("Birthdate cannot be in the future.");
            userDOB = dob.toISOString();
            localStorage.setItem('lifeDOB', userDOB);
            updateStats();
            renderSpiral();
        }

        function updateStats() {
            if (!userDOB) return;
            const dob = new Date(userDOB);
            const now = new Date();
            weeksLivedCount = Math.floor((now - dob) / (1000 * 60 * 60 * 24 * 7));
            if (weeksLivedCount < 0) weeksLivedCount = 0;
            if (weeksLivedCount > TOTAL_WEEKS) weeksLivedCount = TOTAL_WEEKS;

            document.getElementById('stat-lived').innerText = weeksLivedCount;
            document.getElementById('stat-ahead').innerText = TOTAL_WEEKS - weeksLivedCount;
            document.getElementById('stat-percent').innerText = ((weeksLivedCount / TOTAL_WEEKS) * 100).toFixed(1) + '%';
        }

        function renderSentimentButtons() {
            const picker = document.getElementById('sentiment-picker');
            picker.innerHTML = '';
            for (const [key, data] of Object.entries(sentimentLibrary)) {
                const btn = document.createElement('button');
                btn.className = `btn-3d sentiment-btn ${key === currentSentimentKey ? 'active' : ''}`;
                btn.onclick = () => setSentiment(key);
                if (key === currentSentimentKey) btn.style.setProperty('--active-color', data.color);
                btn.innerHTML = `<span class="color-indicator" style="background-color: ${data.color}; box-shadow: 0 0 8px ${data.color}"></span> ${data.name}`;
                picker.appendChild(btn);
            }
        }

        function setSentiment(key) { currentSentimentKey = key; renderSentimentButtons(); }
        
        function addCustomSentiment() {
            const name = document.getElementById('custom-name').value.trim();
            const color = document.getElementById('custom-color').value;
            if (!name) return alert("Please name your emotion.");
            const key = 'custom_' + Date.now(); 
            customSentiments[key] = { name: name, color: color };
            sentimentLibrary[key] = { name: name, color: color };
            localStorage.setItem('lifeCustomSentiments', JSON.stringify(customSentiments));
            document.getElementById('custom-name').value = ''; 
            setSentiment(key); 
        }

        function renderSpiral() {
            spiral.innerHTML = '';
            
            const svgNS = "http://www.w3.org/2000/svg";
            const svgLayer = document.createElementNS(svgNS, "svg");
            svgLayer.setAttribute("viewBox", "0 0 100 100");
            svgLayer.setAttribute("preserveAspectRatio", "xMidYMid meet");
            svgLayer.style.position = "absolute";
            svgLayer.style.top = "0"; svgLayer.style.left = "0";
            svgLayer.style.width = "100%"; svgLayer.style.height = "100%";
            svgLayer.style.zIndex = "0"; svgLayer.style.pointerEvents = "none";

            const dotsContainer = document.createElement('div');
            dotsContainer.style.width = "100%"; dotsContainer.style.height = "100%";

            const maxRadiusPercent = 48; 
            const a = maxRadiusPercent / Math.sqrt(TOTAL_WEEKS); 
            const b = 3.6; 

            let svgPathsHTML = '';
            let currentYear = null;
            let pathData = '';
            let tunnelShade = '';
            let lastX = null, lastY = null;

            for (let n = 0; n < TOTAL_WEEKS; n++) {
                const weekData = getWeekData(n);
                
                const r = a * Math.sqrt(n);
                const theta = b * Math.sqrt(n);
                const x = 50 + r * Math.cos(theta);
                const y = 50 + r * Math.sin(theta);

                if (weekData.calYear !== currentYear) {
                    if (pathData !== '') svgPathsHTML += `<path d="${pathData}" stroke="${tunnelShade}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />`;
                    currentYear = weekData.calYear;
                    tunnelShade = (currentYear % 2 === 0) ? 'rgba(255, 255, 255, 0.08)' : 'rgba(255, 255, 255, 0.02)';
                    pathData = (lastX !== null && lastY !== null) ? `M ${lastX} ${lastY} L ${x} ${y}` : `M ${x} ${y}`;
                } else {
                    pathData += ` L ${x} ${y}`;
                }
                lastX = x; lastY = y;
                
                const dot = document.createElement('div');
                dot.classList.add('week-dot');
                dot.style.left = `${x}%`; dot.style.top = `${y}%`;

                if (userDOB && n === weeksLivedCount) {
                    dot.classList.add('current-week');
                } else if (n < weeksLivedCount) {
                    dot.style.backgroundColor = 'var(--dot-lived)';
                }

                const savedKey = savedSentiments[n];
                if (savedKey && sentimentLibrary[savedKey]) {
                    const color = sentimentLibrary[savedKey].color;
                    dot.style.backgroundColor = color;
                    if (n !== weeksLivedCount) {
                        dot.style.boxShadow = `0 0 6px ${color}, 0 0 12px ${color}`;
                    }
                    dot.style.transform = `translate(-50%, -50%) scale(1.3)`; 
                }

                dot.addEventListener('mouseenter', () => {
                    tooltip.style.opacity = 1;
                    tooltip.style.left = `${x}%`; tooltip.style.top = `${y}%`;
                    tooltip.style.transform = x > 50 ? `translate(calc(-100% - 15px), -50%)` : `translate(15px, -50%)`;
                    
                    let tooltipContent = `<div class="tt-life">Life Week ${weekData.lifeWeek}</div>`;
                    tooltipContent += `<div class="tt-year">Year ${weekData.labelYear} <span style="opacity:0.6; font-size:11px;">(Wk ${weekData.calWeek})</span></div>`;
                    
                    if (n === weeksLivedCount) {
                        tooltipContent += `<div class="tt-emotion" style="color: #fff;">● Present Week</div>`;
                    } else if (savedKey && sentimentLibrary[savedKey]) {
                        tooltipContent += `<div class="tt-emotion" style="color: ${sentimentLibrary[savedKey].color};">
                                            <span class="color-indicator" style="background-color: ${sentimentLibrary[savedKey].color}; width:8px; height:8px;"></span> 
                                            ${sentimentLibrary[savedKey].name}
                                           </div>`;
                    } else if (n < weeksLivedCount) {
                        tooltipContent += `<div class="tt-emotion" style="color: var(--dot-lived);">● Past</div>`;
                    }
                    tooltip.innerHTML = tooltipContent;
                });

                dot.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });

                dot.addEventListener('click', () => {
                    if (n > weeksLivedCount) return alert("You haven't lived this week yet. Stay in the present!");
                    if (savedSentiments[n] === currentSentimentKey) delete savedSentiments[n];
                    else {
                        if (currentSentimentKey === 'changing' && Object.values(savedSentiments).filter(v => v === 'changing').length >= MAX_CHANGES && savedSentiments[n] !== 'changing') return alert("You can only choose 10 life-changing weeks.");
                        savedSentiments[n] = currentSentimentKey;
                    }
                    localStorage.setItem('lifeSentiments', JSON.stringify(savedSentiments));
                    renderSpiral(); 
                });
                dotsContainer.appendChild(dot);
            }

            if (pathData !== '') svgPathsHTML += `<path d="${pathData}" stroke="${tunnelShade}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />`;
            
            svgLayer.innerHTML = svgPathsHTML;
            spiral.appendChild(svgLayer);
            spiral.appendChild(dotsContainer);
        }

        function clearAll() {
            if (confirm("Are you entirely sure you want to erase your canvas?")) { localStorage.clear(); location.reload(); }
        }

        // --- Data Backup System ---
        function exportBackup() {
            const backupData = {
                lifeDOB: localStorage.getItem('lifeDOB'),
                lifeSentiments: localStorage.getItem('lifeSentiments'),
                lifeCustomSentiments: localStorage.getItem('lifeCustomSentiments')
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "life_in_weeks_backup.json");
            dlAnchorElem.click();
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const backup = JSON.parse(e.target.result);
                    if (backup.lifeDOB) localStorage.setItem('lifeDOB', backup.lifeDOB);
                    if (backup.lifeSentiments) localStorage.setItem('lifeSentiments', backup.lifeSentiments);
                    if (backup.lifeCustomSentiments) localStorage.setItem('lifeCustomSentiments', backup.lifeCustomSentiments);
                    
                    alert("Backup loaded successfully! Restoring your memories...");
                    location.reload();
                } catch (error) {
                    alert("Invalid backup file. Please make sure you selected the correct file.");
                }
            };
            reader.readAsText(file);
        }

        // --- Poster Engine ---
        function exportPoster() {
            const mainUi = document.getElementById('main-ui');
            const loading = document.getElementById('loading-screen');
            
            loading.style.display = 'flex'; mainUi.style.display = 'none';

            let emotionCounts = {};
            for (let k in savedSentiments) {
                let key = savedSentiments[k];
                emotionCounts[key] = (emotionCounts[key] || 0) + 1;
            }

            let statsHtml = '';
            if (Object.keys(emotionCounts).length === 0) {
                statsHtml = `<div style="opacity: 0.5; font-style: italic; font-size: 16px;">No emotions marked yet on your canvas.</div>`;
            } else {
                for (let key in emotionCounts) {
                    if (sentimentLibrary[key]) {
                        let data = sentimentLibrary[key];
                        statsHtml += `
                            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-size: 20px; font-weight: 400;">
                                <span style="width: 22px; height: 22px; border-radius: 50%; background-color: ${data.color}; box-shadow: 0 0 12px ${data.color};"></span>
                                <span>${data.name}</span>
                                <span style="margin-left: auto; opacity: 0.7; font-weight: 300;">${emotionCounts[key]} weeks</span>
                            </div>
                        `;
                    }
                }
            }

            const downloadDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            const poster = document.createElement('div');
            poster.style.position = 'fixed'; poster.style.top = '0'; poster.style.left = '0';
            poster.style.width = '1400px'; poster.style.height = '1000px';
            poster.style.backgroundColor = '#0b0f19'; poster.style.color = '#f8fafc';
            poster.style.padding = '60px 80px'; poster.style.boxSizing = 'border-box';
            poster.style.fontFamily = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
            poster.style.display = 'flex'; poster.style.flexDirection = 'column'; poster.style.zIndex = '-9999';

            poster.innerHTML = `
                <div style="text-align: center; margin-bottom: 50px;">
                    <h1 style="margin: 0 0 5px 0; font-weight: 200; letter-spacing: 6px; font-size: 42px; text-transform: uppercase;">LIFE IN WEEKS</h1>
                    <div style="font-weight: 300; opacity: 0.6; font-size: 18px; letter-spacing: 3px; font-style: italic;">by Ambarish Mallick</div>
                </div>
                <div style="display: flex; flex: 1; align-items: center; justify-content: space-between; gap: 60px;">
                    <div style="width: 750px; height: 750px; position: relative;">
                        ${document.getElementById('spiral').innerHTML}
                    </div>
                    <div style="flex: 1; background: rgba(20, 25, 40, 0.4); border-top: 1px solid rgba(255,255,255,0.2); border-left: 1px solid rgba(255,255,255,0.2); border-bottom: 1px solid rgba(0,0,0,0.5); border-right: 1px solid rgba(0,0,0,0.5); border-radius: 24px; padding: 50px; box-shadow: 10px 10px 30px rgba(0,0,0,0.5);">
                        <h2 style="font-weight: 300; letter-spacing: 2px; margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px; font-size: 24px;">JOURNEY STATS</h2>
                        
                        <div style="margin-bottom: 40px; font-size: 18px; opacity: 0.8; font-weight: 300; line-height: 1.8;">
                            <div><strong>Downloaded:</strong> ${downloadDate}</div>
                            <div><strong>Time Lived:</strong> ${weeksLivedCount} / 4000 weeks</div>
                        </div>

                        <h3 style="font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; font-size: 16px; opacity: 0.5; text-transform: uppercase;">Sentimental Breakdown</h3>
                        
                        <div style="display: flex; flex-direction: column;">
                            ${statsHtml}
                        </div>
                    </div>
                </div>
            `;

            document.body.appendChild(poster);

            setTimeout(() => {
                html2canvas(poster, { scale: 2, backgroundColor: '#0b0f19', logging: false }).then(canvas => {
                    const link = document.createElement('a'); 
                    link.download = 'Life_so_far_in_weeks.png';
                    link.href = canvas.toDataURL('image/png'); 
                    link.click();
                    
                    document.body.removeChild(poster); loading.style.display = 'none'; mainUi.style.display = 'flex';
                }).catch(err => {
                    document.body.removeChild(poster); loading.style.display = 'none'; mainUi.style.display = 'flex';
                    alert("Error generating poster.");
                });
            }, 100);
        }

        init();
    </script>
</body>
